<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piratininga — Controle de Gastos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e7e2;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:#161616;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#161616;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;padding:0 1.25rem;gap:1rem;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:1.5rem}
.sidebar-brand{padding:1rem 1.25rem;border-bottom:1px solid #2a2a2a}
.sidebar-brand .name{font-size:13px;font-weight:600;color:#e8e7e2}
.sidebar-brand .sub{font-size:11px;color:#555;margin-top:2px}
.sidebar-nav{padding:.5rem 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;font-size:13px;color:#888;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:#e8e7e2;background:#1e1e1e}
.nav-item.active{color:#e8b544;border-left-color:#e8b544;background:#1e1e1e}
.nav-item i{font-size:16px}
.nav-section{font-size:10px;color:#444;padding:1rem 1.25rem .4rem;letter-spacing:.08em;text-transform:uppercase}
.divider{height:1px;background:#2a2a2a;margin:.25rem 0}
.topbar-title{font-size:14px;font-weight:500;color:#e8e7e2}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-launch{background:#ef5350;color:#fff;border:none;border-radius:6px;padding:0 14px;height:32px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-launch:hover{background:#c62828}
.btn-ganho{background:#4caf50;color:#fff;border:none;border-radius:6px;padding:0 14px;height:32px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-ganho:hover{background:#2e7d32}
.topbar-date{font-size:12px;color:#555}
.cards-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:1.25rem}
@media(max-width:700px){.cards-row{grid-template-columns:1fr 1fr}}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:1rem 1.25rem}
.card-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-value{font-size:22px;font-weight:500;color:#e8e7e2}
.card-value.yellow{color:#e8b544}
.card-value.green{color:#4caf50}
.card-value.red{color:#ef5350}
.card-value.muted{color:#888}
.card-sub{font-size:11px;color:#555;margin-top:4px}
.progress-wrap{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.progress-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.progress-pct{font-size:13px;font-weight:500}
.progress-bar-bg{height:6px;background:#2a2a2a;border-radius:20px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:20px;transition:width .5s ease,background .3s}
.progress-amounts{display:flex;justify-content:space-between;margin-top:8px}
.progress-amounts span{font-size:11px;color:#555}
.orc-input{background:#111;border:1px solid #333;border-radius:6px;color:#e8b544;font-size:14px;font-weight:500;padding:2px 8px;width:160px;text-align:right}
.orc-input:focus{outline:none;border-color:#e8b544}
.charts-row{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:1.25rem}
@media(max-width:700px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:1.25rem}
.chart-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.table-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden}
.table-card table{width:100%;border-collapse:collapse;font-size:13px}
.table-card th{background:#111;color:#555;font-weight:500;padding:10px 14px;text-align:left;border-bottom:1px solid #222;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.table-card td{padding:10px 14px;border-bottom:1px solid #1f1f1f;color:#ccc}
.table-card tr:last-child td{border-bottom:none}
.table-card tr:hover td{background:#1f1f1f}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge.pago{background:#1a3a25;color:#4caf50}
.badge.apagar{background:#3a2e0a;color:#e8b544}
.badge.cancel{background:#2a1515;color:#ef5350}
.del-btn{background:none;border:none;cursor:pointer;color:#444;font-size:14px;padding:4px 6px;border-radius:4px}
.del-btn:hover{color:#ef5350;background:#2a1515}
.edit-btn{background:none;border:none;cursor:pointer;color:#444;font-size:14px;padding:4px 6px;border-radius:4px}
.edit-btn:hover{color:#e8b544;background:#2a2000}
.btn-add-cat{width:calc(100% - 2.5rem);margin:0.75rem 1.25rem 0.25rem;height:30px;background:#1e1e1e;color:#888;border:1px dashed #333;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn-add-cat:hover{color:#e8b544;border-color:#e8b544}
.nav-item-wrap{position:relative;display:flex;align-items:center}
.nav-item-wrap .nav-item{flex:1}
.nav-dots{background:none;border:none;color:#444;cursor:pointer;padding:6px 8px;font-size:14px;position:absolute;right:4px;opacity:0;transition:opacity .15s;border-radius:4px}
.nav-item-wrap:hover .nav-dots{opacity:1}
.nav-dots:hover{color:#e8b544;background:#2a2000}
.cat-menu{display:none;position:absolute;right:4px;top:100%;background:#222;border:1px solid #333;border-radius:7px;z-index:50;min-width:130px;padding:4px 0;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.cat-menu.open{display:block}
.cat-menu-item{padding:8px 12px;font-size:12px;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:8px}
.cat-menu-item:hover{background:#2a2a2a;color:#e8e7e2}
.cat-menu-item.danger:hover{color:#ef5350}
.empty{text-align:center;padding:2.5rem;color:#444;font-size:13px}
.cat-total-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.cat-stat{display:flex;flex-direction:column;gap:4px}
.cat-stat-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.cat-stat-value{font-size:18px;font-weight:500}
.legend-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:1.5rem;width:420px;max-width:95vw}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:4px}
.modal-close:hover{color:#e8e7e2}
.modal .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.modal .form-group label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.modal .form-group input,
.modal .form-group select{height:38px;background:#111;border:1px solid #333;border-radius:7px;padding:0 12px;font-size:13px;color:#e8e7e2}
.modal .form-group input:focus,
.modal .form-group select:focus{outline:none;border-color:#e8b544}
.modal .form-group select option{background:#1a1a1a}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-confirm{width:100%;height:40px;background:#e8b544;color:#0f0f0f;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-confirm:hover{background:#d4a33e}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:.75rem 1rem;font-size:13px;color:#e8e7e2;display:none;z-index:200;align-items:center;gap:8px}
.toast.show{display:flex}
.toast.ok{border-color:#4caf50;color:#4caf50}
.toast.err{border-color:#ef5350;color:#ef5350}
.loading{text-align:center;padding:3rem;color:#444;font-size:13px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0f0f0f}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="name">Piratininga</div>
      <div class="sub">controle de gastos</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="navigate('geral')" id="nav-geral">
        <i class="ti ti-layout-dashboard"></i> Visão Geral
      </div>
      <div class="divider"></div>
      <button class="btn-add-cat" onclick="openModalAddCat()"><i class="ti ti-plus"></i> Adicionar categoria</button>
      <div class="nav-section">Categorias</div>
      <div id="cat-nav-list"></div>
      <div class="divider"></div>
      <div class="nav-item" onclick="navigate('ganhos')" id="nav-ganhos">
        <i class="ti ti-trending-up"></i> Ganhos
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Visão Geral</span>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <button class="btn-ganho" onclick="openModalGanho()">
          <i class="ti ti-plus"></i> Lançar ganho
        </button>
        <button class="btn-launch" onclick="openModal()">
          <i class="ti ti-minus"></i> Lançar gasto
        </button>
      </div>
    </div>
    <div class="content" id="content"><div class="loading">Carregando...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Lançar gasto</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Piso porcelanato sala">
    </div>
    <div class="modal-row">
      <div class="form-group">
        <label>Categoria</label>
        <select id="f-cat" onclick="populateCatSelect('f-cat')">
          <option value="obra">Obra / Reforma</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
    </div>
    <div class="modal-row">
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="pago">Pago</option>
          <option value="apagar">A pagar</option>
          <option value="cancel">Cancelado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Observação (opcional)</label>
      <input type="text" id="f-obs" placeholder="Fornecedor, nota, detalhe...">
    </div>
    <button class="btn-confirm" id="btn-confirm" onclick="addGasto()">Confirmar lançamento</button>
  </div>
</div>

<div class="modal-overlay" id="modal-ganho-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" style="color:#4caf50">Lançar ganho</span>
      <button class="modal-close" onclick="closeModalGanho()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="g-desc" placeholder="Ex: Venda do apartamento">
    </div>
    <div class="modal-row">
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="g-valor" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="g-data">
      </div>
    </div>
    <div class="form-group">
      <label>Observação (opcional)</label>
      <input type="text" id="g-obs" placeholder="Detalhe...">
    </div>
    <button class="btn-confirm" id="btn-confirm-ganho" onclick="addGanho()" style="background:#4caf50">Confirmar ganho</button>
  </div>
</div>

<div class="modal-overlay" id="modal-add-cat-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Adicionar categoria</span>
      <button class="modal-close" onclick="closeModalAddCat()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label>Nome da categoria</label>
      <input type="text" id="nc-nome" placeholder="Ex: Decoração">
    </div>
    <div class="form-group">
      <label>Ícone (Tabler Icon)</label>
      <input type="text" id="nc-icon" placeholder="Ex: ti-star" value="ti-tag">
    </div>
    <div class="form-group">
      <label>Cor</label>
      <input type="color" id="nc-color" value="#e8b544" style="height:38px;padding:2px 6px;cursor:pointer">
    </div>
    <button class="btn-confirm" onclick="addCat()">Criar categoria</button>
  </div>
</div>

<div class="modal-overlay" id="modal-edit-cat-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Editar categoria</span>
      <button class="modal-close" onclick="closeModalEditCat()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="ec-nome">
    </div>
    <div class="form-group">
      <label>Ícone (Tabler Icon)</label>
      <input type="text" id="ec-icon">
    </div>
    <div class="form-group">
      <label>Cor</label>
      <input type="color" id="ec-color" style="height:38px;padding:2px 6px;cursor:pointer">
    </div>
    <button class="btn-confirm" onclick="saveEditCat()">Salvar</button>
  </div>
</div>

<div class="modal-overlay" id="modal-edit-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="edit-modal-title">Editar lançamento</span>
      <button class="modal-close" onclick="closeModalEdit()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="e-desc">
    </div>
    <div id="e-cat-row" class="modal-row">
      <div class="form-group">
        <label>Categoria</label>
        <select id="e-cat" onclick="populateCatSelect('e-cat')">
          <option value="obra">Obra / Reforma</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="e-data">
      </div>
    </div>
    <div id="e-data-row-ganho" class="form-group" style="display:none">
      <label>Data</label>
      <input type="date" id="e-data-ganho">
    </div>
    <div class="modal-row">
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="e-valor" step="0.01" min="0">
      </div>
      <div class="form-group" id="e-status-group">
        <label>Status</label>
        <select id="e-status">
          <option value="pago">Pago</option>
          <option value="apagar">A pagar</option>
          <option value="cancel">Cancelado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Observação</label>
      <input type="text" id="e-obs">
    </div>
    <button class="btn-confirm" id="btn-confirm-edit" onclick="saveEdit()">Salvar alterações</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG SUPABASE ──────────────────────────────────────────────
const SB_URL = 'https://jdoyzuqwmgclgicceqoc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impkb3l6dXF3bWdjbGdpY2NlcW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTYxNTUsImV4cCI6MjA5ODA3MjE1NX0.clZnnjg404ItiG5XKCSwWE0YZeY1OU_sis7_gH7cP4g';
const TABLE  = 'piratininga';
const HEADERS = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const DEFAULT_CATS = {
  obra:    {label:'Obra / Reforma',   icon:'ti-hammer',   color:'#e8b544'},
  moveis:  {label:'Móveis',           icon:'ti-armchair', color:'#4caf50'},
  eletro:  {label:'Eletrodomésticos', icon:'ti-plug',     color:'#2a78d6'},
  taxas:   {label:'Taxas / Cartório', icon:'ti-receipt-2',color:'#ab47bc'},
  mudanca: {label:'Mudança',          icon:'ti-truck',    color:'#ef5350'},
};
let CATS = JSON.parse(localStorage.getItem('pirati_cats') || JSON.stringify(DEFAULT_CATS));
function saveCats(){ localStorage.setItem('pirati_cats', JSON.stringify(CATS)); }

function renderCatNav(){
  const list = document.getElementById('cat-nav-list');
  if(!list) return;
  list.innerHTML = Object.keys(CATS).map(k=>`
    <div class="nav-item-wrap" id="nav-wrap-${k}">
      <div class="nav-item" onclick="navigate('${k}')" id="nav-${k}">
        <i class="ti ${CATS[k].icon}"></i> ${CATS[k].label}
      </div>
      <button class="nav-dots" onclick="toggleCatMenu('${k}',event)" title="Opções"><i class="ti ti-dots-vertical"></i></button>
      <div class="cat-menu" id="cat-menu-${k}">
        <div class="cat-menu-item" onclick="openEditCat('${k}')"><i class="ti ti-pencil"></i> Renomear</div>
        <div class="cat-menu-item danger" onclick="deleteCat('${k}')"><i class="ti ti-trash"></i> Excluir</div>
      </div>
    </div>
  `).join('');
  // reapply active
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const active = document.getElementById('nav-'+currentPage);
  if(active) active.classList.add('active');
}

function toggleCatMenu(k, e){
  e.stopPropagation();
  document.querySelectorAll('.cat-menu').forEach(m=>{ if(m.id!=='cat-menu-'+k) m.classList.remove('open'); });
  document.getElementById('cat-menu-'+k).classList.toggle('open');
}
document.addEventListener('click', ()=>document.querySelectorAll('.cat-menu').forEach(m=>m.classList.remove('open')));

// Add cat
function openModalAddCat(){ document.getElementById('modal-add-cat-overlay').classList.add('open'); setTimeout(()=>document.getElementById('nc-nome').focus(),100); }
function closeModalAddCat(){ document.getElementById('modal-add-cat-overlay').classList.remove('open'); }
document.getElementById('modal-add-cat-overlay').addEventListener('click',function(e){ if(e.target===this) closeModalAddCat(); });

function addCat(){
  const nome  = document.getElementById('nc-nome').value.trim();
  const icon  = document.getElementById('nc-icon').value.trim()||'ti-tag';
  const color = document.getElementById('nc-color').value;
  if(!nome){ alert('Preencha o nome.'); return; }
  const key = nome.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if(CATS[key]){ alert('Já existe uma categoria com esse nome.'); return; }
  CATS[key] = {label:nome, icon, color};
  saveCats();
  closeModalAddCat();
  document.getElementById('nc-nome').value='';
  renderCatNav();
  toast('Categoria criada!');
}

// Edit cat
let editingCatKey = null;
function openEditCat(k){
  editingCatKey = k;
  document.getElementById('ec-nome').value = CATS[k].label;
  document.getElementById('ec-icon').value = CATS[k].icon;
  document.getElementById('ec-color').value = CATS[k].color;
  document.getElementById('modal-edit-cat-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ec-nome').focus(),100);
}
function closeModalEditCat(){ document.getElementById('modal-edit-cat-overlay').classList.remove('open'); editingCatKey=null; }
document.getElementById('modal-edit-cat-overlay').addEventListener('click',function(e){ if(e.target===this) closeModalEditCat(); });

function saveEditCat(){
  const nome  = document.getElementById('ec-nome').value.trim();
  const icon  = document.getElementById('ec-icon').value.trim()||'ti-tag';
  const color = document.getElementById('ec-color').value;
  if(!nome){ alert('Preencha o nome.'); return; }
  CATS[editingCatKey] = {label:nome, icon, color};
  saveCats();
  closeModalEditCat();
  renderCatNav();
  toast('Categoria atualizada!');
}

function deleteCat(k){
  if(!confirm('Excluir a categoria "'+CATS[k].label+'"? Os lançamentos dela não serão apagados.')) return;
  delete CATS[k];
  saveCats();
  if(currentPage===k) navigate('geral');
  else renderCatNav();
  toast('Categoria removida.');
}

let gastos = [];
let orcamento = parseFloat(localStorage.getItem('pirati_orc')||'80000');
let currentPage = 'geral';
let barChart, pieChart, catChart;

function fmt(v){ return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtShort(v){ return v>=1000?'R$'+Math.round(v/1000)+'k':fmt(v); }

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+type;
  setTimeout(()=>t.className='toast',2500);
}

// ── SUPABASE API ─────────────────────────────────────────────────
async function sbFetch(gastos){
  const res = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=*&order=created_at.desc`,{headers:HEADERS});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbInsert(row){
  const res = await fetch(`${SB_URL}/rest/v1/${TABLE}`,{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(row)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(id){
  const res = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`,{method:'DELETE',headers:HEADERS});
  if(!res.ok) throw new Error(await res.text());
}

// ── GANHOS ───────────────────────────────────────────────────────
function openModalGanho(){
  document.getElementById('modal-ganho-overlay').classList.add('open');
  document.getElementById('g-data').value = new Date().toISOString().split('T')[0];
  setTimeout(()=>document.getElementById('g-desc').focus(),100);
}
function closeModalGanho(){ document.getElementById('modal-ganho-overlay').classList.remove('open'); }
document.getElementById('modal-ganho-overlay').addEventListener('click',function(e){ if(e.target===this) closeModalGanho(); });

async function addGanho(){
  const desc = document.getElementById('g-desc').value.trim();
  const val  = parseFloat(document.getElementById('g-valor').value);
  const data = document.getElementById('g-data').value;
  const obs  = document.getElementById('g-obs').value.trim();
  if(!desc){ alert('Preencha a descrição.'); return; }
  if(isNaN(val)||val<=0){ alert('Preencha um valor válido.'); return; }
  const btn = document.getElementById('btn-confirm-ganho');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try{
    await sbInsert({descricao:desc,categoria:'ganho',data,valor:val,status:'pago',obs,orcamento:0});
    document.getElementById('g-desc').value='';
    document.getElementById('g-valor').value='';
    document.getElementById('g-obs').value='';
    closeModalGanho();
    toast('Ganho registrado!');
    await loadGastos();
  } catch(e){
    toast('Erro ao salvar: '+e.message,'err');
  } finally{
    btn.disabled=false; btn.textContent='Confirmar ganho';
  }
}

// ── EDIT ─────────────────────────────────────────────────────────
let editingId = null;
let editingIsGanho = false;

function openEdit(id){
  const g = gastos.find(x=>x.id===id);
  if(!g) return;
  editingId = id;
  editingIsGanho = g.categoria==='ganho';

  document.getElementById('edit-modal-title').textContent = editingIsGanho ? 'Editar ganho' : 'Editar gasto';
  document.getElementById('e-desc').value = g.descricao||'';
  document.getElementById('e-valor').value = g.valor||'';
  document.getElementById('e-obs').value = g.obs||'';

  if(editingIsGanho){
    document.getElementById('e-cat-row').style.display='none';
    document.getElementById('e-data-row-ganho').style.display='';
    document.getElementById('e-data-ganho').value = g.data||'';
    document.getElementById('e-status-group').style.display='none';
    document.getElementById('btn-confirm-edit').style.background='#4caf50';
  } else {
    document.getElementById('e-cat-row').style.display='';
    document.getElementById('e-data-row-ganho').style.display='none';
    document.getElementById('e-cat').value = g.categoria||'obra';
    document.getElementById('e-data').value = g.data||'';
    document.getElementById('e-status-group').style.display='';
    document.getElementById('e-status').value = g.status||'pago';
    document.getElementById('btn-confirm-edit').style.background='#e8b544';
  }

  document.getElementById('modal-edit-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('e-desc').focus(),100);
}
function closeModalEdit(){ document.getElementById('modal-edit-overlay').classList.remove('open'); editingId=null; }
document.getElementById('modal-edit-overlay').addEventListener('click',function(e){ if(e.target===this) closeModalEdit(); });

async function saveEdit(){
  const desc = document.getElementById('e-desc').value.trim();
  const val  = parseFloat(document.getElementById('e-valor').value);
  const obs  = document.getElementById('e-obs').value.trim();
  if(!desc){ alert('Preencha a descrição.'); return; }
  if(isNaN(val)||val<=0){ alert('Preencha um valor válido.'); return; }

  const btn = document.getElementById('btn-confirm-edit');
  btn.disabled=true; btn.textContent='Salvando...';

  let row = {descricao:desc, valor:val, obs};
  if(editingIsGanho){
    row.data = document.getElementById('e-data-ganho').value;
  } else {
    row.categoria = document.getElementById('e-cat').value;
    row.data = document.getElementById('e-data').value;
    row.status = document.getElementById('e-status').value;
  }

  try{
    const res = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${editingId}`,{
      method:'PATCH',
      headers:{...HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify(row)
    });
    if(!res.ok) throw new Error(await res.text());
    closeModalEdit();
    toast('Lançamento atualizado!');
    await loadGastos();
  } catch(e){
    toast('Erro ao salvar: '+e.message,'err');
  } finally{
    btn.disabled=false; btn.textContent='Salvar alterações';
  }
}

// ── LOAD ─────────────────────────────────────────────────────────
async function loadGastos(){
  try{
    gastos = await sbFetch();
    renderCatNav();
    render();
  } catch(e){
    console.error(e);
    document.getElementById('content').innerHTML = '<div class="loading" style="color:#ef5350">Erro ao conectar ao banco de dados.<br><small>'+e.message+'</small></div>';
  }
}

// ── MODAL ────────────────────────────────────────────────────────
function populateCatSelect(id){
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = Object.keys(CATS).map(k=>`<option value="${k}"${k===cur?' selected':''}>${CATS[k].label}</option>`).join('');
}
function openModal(cat){
  populateCatSelect('f-cat');
  if(cat) document.getElementById('f-cat').value = cat;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(),100);
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

async function addGasto(){
  const desc = document.getElementById('f-desc').value.trim();
  const cat  = document.getElementById('f-cat').value;
  const data = document.getElementById('f-data').value;
  const val  = parseFloat(document.getElementById('f-valor').value);
  const st   = document.getElementById('f-status').value;
  const obs  = document.getElementById('f-obs').value.trim();
  if(!desc){ alert('Preencha a descrição.'); return; }
  if(isNaN(val)||val<=0){ alert('Preencha um valor válido.'); return; }
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try{
    await sbInsert({descricao:desc,categoria:cat,data,valor:val,status:st,obs,orcamento});
    document.getElementById('f-desc').value='';
    document.getElementById('f-valor').value='';
    document.getElementById('f-obs').value='';
    closeModal();
    toast('Gasto salvo com sucesso!');
    await loadGastos();
  } catch(e){
    toast('Erro ao salvar: '+e.message,'err');
  } finally{
    btn.disabled=false; btn.textContent='Confirmar lançamento';
  }
}

async function removeGasto(id){
  if(!confirm('Remover este gasto?')) return;
  try{
    await sbDelete(id);
    toast('Gasto removido.');
    await loadGastos();
  } catch(e){ toast('Erro ao remover.','err'); }
}

// ── NAVIGATE ─────────────────────────────────────────────────────
function navigate(page){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const activeEl = document.getElementById('nav-'+page);
  if(activeEl) activeEl.classList.add('active');
  const titles={geral:'Visão Geral',obra:'Obra / Reforma',moveis:'Móveis',eletro:'Eletrodomésticos',taxas:'Taxas / Cartório',mudanca:'Mudança',ganhos:'Ganhos'};
  document.getElementById('topbar-title').textContent = titles[page];
  if(barChart){barChart.destroy();barChart=null;}
  if(pieChart){pieChart.destroy();pieChart=null;}
  if(catChart){catChart.destroy();catChart=null;}
  render();
}

function render(){
  if(currentPage==='geral') renderGeral();
  else if(currentPage==='ganhos') renderGanhos();
  else renderCat(currentPage);
}

// ── GERAL ────────────────────────────────────────────────────────
function renderGeral(){
  const ganhos  = gastos.filter(g=>g.categoria==='ganho');
  const totalGanhos = ganhos.reduce((s,g)=>s+(g.valor||0),0);
  const ativos = gastos.filter(g=>g.status!=='cancel'&&g.categoria!=='ganho');
  const total  = ativos.reduce((s,g)=>s+(g.valor||0),0);
  const pago   = gastos.filter(g=>g.status==='pago'&&g.categoria!=='ganho').reduce((s,g)=>s+(g.valor||0),0);
  const apagar = gastos.filter(g=>g.status==='apagar').reduce((s,g)=>s+(g.valor||0),0);
  const saldo  = totalGanhos - total;
  const pct    = totalGanhos>0?Math.min(100,Math.round(total/totalGanhos*100)):0;
  const barColor = pct>90?'#ef5350':pct>70?'#e8b544':'#4caf50';

  document.getElementById('content').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Saldo restante</span>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:15px;font-weight:600;color:${saldo<0?'#ef5350':'#4caf50'}">${fmt(saldo)}</span>
          <span class="progress-pct" style="color:${barColor}">${pct}% gasto</span>
        </div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="progress-amounts">
        <span>Gasto: ${fmt(total)}</span>
        <span>Saldo: <strong style="color:${saldo<0?'#ef5350':'#4caf50'}">${fmt(saldo)}</strong></span>
      </div>
    </div>

    <div class="cards-row">
      <div class="card">
        <div class="card-label"><i class="ti ti-wallet" style="font-size:13px;color:#4caf50"></i> Saldo restante</div>
        <div class="card-value ${saldo<0?'red':'green'}">${fmt(saldo)}</div>
        <div class="card-sub">${ganhos.length} entradas registradas</div>
      </div>
      <div class="card">
        <div class="card-label"><i class="ti ti-receipt" style="font-size:13px;color:#ef5350"></i> Total gasto</div>
        <div class="card-value red">${fmt(total)}</div>
        <div class="card-sub">${ativos.length} lançamentos</div>
      </div>
      <div class="card">
        <div class="card-label"><i class="ti ti-circle-check" style="font-size:13px;color:#4caf50"></i> Já pago</div>
        <div class="card-value green">${fmt(pago)}</div>
      </div>
      <div class="card">
        <div class="card-label"><i class="ti ti-clock" style="font-size:13px;color:#e8b544"></i> A pagar</div>
        <div class="card-value yellow">${fmt(apagar)}</div>
        <div class="card-sub" style="margin-top:8px;padding-top:8px;border-top:1px solid #2a2a2a">
          <span style="color:#555">Saldo se tudo pago:</span><br>
          <span style="font-size:14px;font-weight:600;color:${(saldo-apagar)<0?'#ef5350':'#4caf50'}">${fmt(saldo-apagar)}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-label"><i class="ti ti-trending-up" style="font-size:13px;color:#888"></i> Total de ganhos</div>
        <div class="card-value muted">${fmt(totalGanhos)}</div>
        <div class="card-sub">${ganhos.length} entradas</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Total por categoria</div>
        <div id="bar-legend" class="legend-row"></div>
        <div style="position:relative;height:200px"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribuição</div>
        <div id="pie-legend" class="legend-row"></div>
        <div style="position:relative;height:200px"><canvas id="pieChart"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead><tr>
          <th>Data</th><th>Descrição</th><th>Categoria</th>
          <th style="text-align:right">Valor</th><th>Status</th><th>Obs</th><th></th>
        </tr></thead>
        <tbody>${renderRows(gastos.filter(g=>g.categoria!=='ganho'))}</tbody>
      </table>
    </div>
  `;

  const values = Object.keys(CATS).map(k=>ativos.filter(g=>g.categoria===k).reduce((s,g)=>s+(g.valor||0),0));
  const colors = Object.values(CATS).map(c=>c.color);
  const labels = Object.values(CATS).map(c=>c.label.split('/')[0].trim());
  const hasData = values.some(v=>v>0);

  document.getElementById('bar-legend').innerHTML = Object.values(CATS).map((c,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.label.split('/')[0].trim()}</span>`).join('');

  barChart = new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}},
              y:{grid:{color:'#222'},ticks:{color:'#555',font:{size:10},callback:v=>fmtShort(v)}}}}
  });

  const pd = hasData?values:[1];
  const pc = hasData?colors:['#2a2a2a'];
  document.getElementById('pie-legend').innerHTML = hasData
    ? Object.values(CATS).map((c,i)=>values[i]>0?`<span class="legend-item"><span class="legend-dot" style="background:${c.color}"></span>${c.label.split('/')[0].trim()}</span>`:'').join('')
    : '<span style="font-size:11px;color:#444">Sem dados</span>';

  pieChart = new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:hasData?Object.values(CATS).map(c=>c.label):['Sem dados'],datasets:[{data:pd,backgroundColor:pc,borderWidth:2,borderColor:'#1a1a1a'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>hasData?ctx.label+': '+fmt(ctx.raw):''}}}}
  });
}

// ── GANHOS PAGE ──────────────────────────────────────────────────
function renderGanhos(){
  const lista = gastos.filter(g=>g.categoria==='ganho');
  const total = lista.reduce((s,g)=>s+(g.valor||0),0);

  document.getElementById('content').innerHTML = `
    <div class="cat-total-card" style="border-left:3px solid #4caf50">
      <div class="cat-stat">
        <span class="cat-stat-label">Total de ganhos</span>
        <span class="cat-stat-value" style="color:#4caf50">${fmt(total)}</span>
      </div>
      <div class="cat-stat">
        <span class="cat-stat-label">Entradas</span>
        <span class="cat-stat-value" style="color:#888">${lista.length}</span>
      </div>
      <div style="margin-left:auto">
        <button class="btn-ganho" onclick="openModalGanho()"><i class="ti ti-plus"></i> Lançar ganho</button>
      </div>
    </div>
    <div class="table-card">
      <table>
        <thead><tr>
          <th>Data</th><th>Descrição</th>
          <th style="text-align:right">Valor</th><th>Obs</th><th></th>
        </tr></thead>
        <tbody>${renderGanhoRows(lista)}</tbody>
      </table>
    </div>
  `;
}

function renderGanhoRows(list){
  if(!list.length) return '<tr><td colspan="5" class="empty">Nenhum ganho registrado ainda.</td></tr>';
  return list.map(g=>`
    <tr>
      <td style="color:#555;white-space:nowrap;font-size:12px">${g.data||'—'}</td>
      <td>${g.descricao||''}</td>
      <td style="text-align:right;font-weight:500;color:#4caf50">${fmt(g.valor||0)}</td>
      <td style="color:#555;font-size:12px">${g.obs||''}</td>
      <td style="white-space:nowrap">
        <button class="edit-btn" onclick="openEdit(${g.id})"><i class="ti ti-pencil"></i></button>
        <button class="del-btn" onclick="removeGasto(${g.id})"><i class="ti ti-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

// ── CATEGORIA ────────────────────────────────────────────────────
function renderCat(cat){
  const info   = CATS[cat];
  const lista  = gastos.filter(g=>g.categoria===cat);
  const ativos = lista.filter(g=>g.status!=='cancel');
  const total  = ativos.reduce((s,g)=>s+(g.valor||0),0);
  const pago   = lista.filter(g=>g.status==='pago').reduce((s,g)=>s+(g.valor||0),0);
  const apagar = lista.filter(g=>g.status==='apagar').reduce((s,g)=>s+(g.valor||0),0);

  const byMonth={};
  ativos.forEach(g=>{const m=g.data?g.data.slice(0,7):'s/d';byMonth[m]=(byMonth[m]||0)+(g.valor||0);});
  const months=Object.keys(byMonth).sort();
  const mVals=months.map(m=>byMonth[m]);

  document.getElementById('content').innerHTML = `
    <div class="cat-total-card" style="border-left:3px solid ${info.color}">
      <div class="cat-stat">
        <span class="cat-stat-label">Total comprometido</span>
        <span class="cat-stat-value" style="color:${info.color}">${fmt(total)}</span>
      </div>
      <div class="cat-stat">
        <span class="cat-stat-label">Já pago</span>
        <span class="cat-stat-value" style="color:#4caf50">${fmt(pago)}</span>
      </div>
      <div class="cat-stat">
        <span class="cat-stat-label">A pagar</span>
        <span class="cat-stat-value" style="color:#e8b544">${fmt(apagar)}</span>
      </div>
      <div class="cat-stat">
        <span class="cat-stat-label">Lançamentos</span>
        <span class="cat-stat-value" style="color:#888">${ativos.length}</span>
      </div>
      <div style="margin-left:auto">
        <button class="btn-launch" onclick="openModal('${cat}')"><i class="ti ti-plus"></i> Lançar aqui</button>
      </div>
    </div>

    ${months.length>=2?`
    <div class="chart-card" style="margin-bottom:1.25rem">
      <div class="chart-title">Evolução de gastos</div>
      <div style="position:relative;height:160px"><canvas id="catChart"></canvas></div>
    </div>`:''}

    <div class="table-card">
      <table>
        <thead><tr>
          <th>Data</th><th>Descrição</th>
          <th style="text-align:right">Valor</th><th>Status</th><th>Obs</th><th></th>
        </tr></thead>
        <tbody>${renderRows(lista, true)}</tbody>
      </table>
    </div>
  `;

  if(months.length>=2){
    catChart = new Chart(document.getElementById('catChart'),{
      type:'bar',
      data:{labels:months.map(m=>{const[y,mo]=m.split('-');return mo+'/'+y.slice(2);}),
            datasets:[{data:mVals,backgroundColor:info.color,borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)}}},
        scales:{x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}},
                y:{grid:{color:'#222'},ticks:{color:'#555',font:{size:10},callback:v=>fmtShort(v)}}}}
    });
  }
}

function renderRows(list, hideCat=false){
  if(!list.length) return `<tr><td colspan="${hideCat?6:7}" class="empty">Nenhum gasto aqui ainda.</td></tr>`;
  return list.map(g=>`
    <tr>
      <td style="color:#555;white-space:nowrap;font-size:12px">${g.data||'—'}</td>
      <td>${g.descricao||''}</td>
      ${hideCat?'':'<td style="color:#555;font-size:12px">'+(CATS[g.categoria]?.label||g.categoria)+'</td>'}
      <td style="text-align:right;font-weight:500">${fmt(g.valor||0)}</td>
      <td><span class="badge ${g.status}">${g.status==='pago'?'Pago':g.status==='apagar'?'A pagar':'Cancelado'}</span></td>
      <td style="color:#555;font-size:12px">${g.obs||''}</td>
      <td style="white-space:nowrap">
        <button class="edit-btn" onclick="openEdit(${g.id})"><i class="ti ti-pencil"></i></button>
        <button class="del-btn" onclick="removeGasto(${g.id})"><i class="ti ti-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function saveOrc(v){
  orcamento = parseFloat(v)||0;
  localStorage.setItem('pirati_orc', orcamento);
}

// ── INIT ─────────────────────────────────────────────────────────
document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
renderCatNav();
loadGastos();
</script>
</body>
